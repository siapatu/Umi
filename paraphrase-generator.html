<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paraphrase and Keyword Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        #container { max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 120px; }
        button { margin-top: 10px; padding: 10px 15px; }
        #suggestions, #keywords { margin-top: 20px; }
        .suggestion { padding: 5px; border: 1px solid #ddd; margin-top: 5px; }
        .copy-btn { cursor: pointer; }
    </style>
</head>
<body>
<div id="container">
    <h1>Paraphrase and Keyword Generator</h1>
    <textarea id="inputText" placeholder="Type your text here..."></textarea>
    <button onclick="generateSuggestions()">Generate Suggestions</button>
    <div id="suggestions"></div>
    <div id="keywords"></div>
</div>

<script>
    function generateSuggestions() {
        const inputText = document.getElementById('inputText').value;
        // Mock data for suggestions and keywords
        const suggestions = [
            inputText.split(' ').reverse().join(' '), // Sample suggestion 1 
            inputText + ' (alternative)', // Sample suggestion 2
            'This is a different wording for: ' + inputText // Sample suggestion 3
        ];
        const keywords = ['keyword1', 'keyword2', 'keyword3'];
        displaySuggestions(suggestions);
        displayKeywords(keywords);
    }

    function displaySuggestions(suggestions) {
        const suggestionsDiv = document.getElementById('suggestions');
        suggestionsDiv.innerHTML = '<h2>Suggestions:</h2>' + suggestions.map(s => `<div class='suggestion'>${s} <span class='copy-btn' onclick="copyToClipboard('${s}')">Copy</span></div>`).join('');
    }

    function displayKeywords(keywords) {
        const keywordsDiv = document.getElementById('keywords');
        keywordsDiv.innerHTML = '<h2>Keywords:</h2>' + keywords.join(', ');
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert('Copied to clipboard: ' + text);
    }
</script>
</body>
</html>
