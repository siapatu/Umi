name: iOS Build

on:
  push:
    branches: ["main", "master"]
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Find iOS project/workspace
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          workspace=$(find ios -maxdepth 3 -name '*.xcworkspace' | head -n 1 || true)
          project=$(find ios -maxdepth 3 -name '*.xcodeproj' | head -n 1 || true)

          if [[ -n "$workspace" ]]; then
            echo "kind=workspace" >> "$GITHUB_OUTPUT"
            echo "path=$workspace" >> "$GITHUB_OUTPUT"
            scheme=$(xcodebuild -list -workspace "$workspace" | awk '/Schemes:/{flag=1; next} flag && NF {print; exit}' | xargs)
          elif [[ -n "$project" ]]; then
            echo "kind=project" >> "$GITHUB_OUTPUT"
            echo "path=$project" >> "$GITHUB_OUTPUT"
            scheme=$(xcodebuild -list -project "$project" | awk '/Schemes:/{flag=1; next} flag && NF {print; exit}' | xargs)
          else
            echo "No iOS .xcworkspace or .xcodeproj found under ios/."
            exit 1
          fi

          if [[ -z "${scheme:-}" ]]; then
            echo "Could not detect an Xcode scheme automatically."
            exit 1
          fi

          echo "scheme=$scheme" >> "$GITHUB_OUTPUT"

      - name: Build for iOS Simulator
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.detect.outputs.kind }}" == "workspace" ]]; then
            xcodebuild \
              -workspace "${{ steps.detect.outputs.path }}" \
              -scheme "${{ steps.detect.outputs.scheme }}" \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 15' \
              -configuration Debug \
              build
          else
            xcodebuild \
              -project "${{ steps.detect.outputs.path }}" \
              -scheme "${{ steps.detect.outputs.scheme }}" \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,name=iPhone 15' \
              -configuration Debug \
              build
          fi
